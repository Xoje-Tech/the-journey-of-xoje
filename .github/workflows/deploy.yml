name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # version is auto-detected from package.json "packageManager" field
        # (pnpm@11.9.0). Don't pass `version` explicitly — causes ERR_PNPM_BAD_PM_VERSION.

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Materialize CV markdown
        # Slice 3.1: standalone script reads tests/fixtures/portfolio/ (committed DATA)
        # and writes src/content/cv.{es,en}.md. No @personal-brand/* imports.
        run: |
          PB_DATA_DIR="$GITHUB_WORKSPACE/tests/fixtures/portfolio" \
          node scripts/build-cv-static.mjs

      - name: Build Astro
        run: pnpm build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
